name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["2.7", "3.0", "3.1", "3.2", "3.3"]
        jekyll: ["~> 3.9", "~> 4.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Pin Jekyll ${{ matrix.jekyll }}
        run: |
          cat > Gemfile.local <<EOF
          gem "jekyll", "${{ matrix.jekyll }}"
          EOF
          echo 'eval_gemfile File.expand_path("Gemfile.local", __dir__)' >> Gemfile

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build gem
        run: gem build jekyll-llms-output.gemspec

      - name: Run tests
        run: bundle exec rspec
